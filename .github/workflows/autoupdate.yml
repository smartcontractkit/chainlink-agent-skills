name: Autoupdate — Weekly skill documentation sync

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate all descriptions (ignore stored checksums)'
        type: boolean
        default: false
      skill:
        description: 'Limit to one skill directory name (leave blank for all)'
        type: string
        default: ''
      dry_run:
        description: 'Detect changes only — do not write files or open a PR'
        type: boolean
        default: false
      checksums_only:
        description: 'Fetch all pages and snapshot checksums to state.json without any LLM calls or file updates'
        type: boolean
        default: false

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r autoupdate/requirements.txt

      - name: Run autoupdate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL: ${{ vars.AUTOUPDATE_MODEL || 'gpt-4o-mini' }}
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ -n "${{ inputs.skill }}" ]; then
            ARGS="$ARGS --skill ${{ inputs.skill }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.checksums_only }}" = "true" ]; then
            ARGS="$ARGS --checksums-only"
          fi
          python autoupdate/autoupdate.py $ARGS

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create branch and commit
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        id: commit
        run: |
          BRANCH="autoupdate/$(date -u +%Y-%m-%d)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the branch (force allows re-running same day)
          git checkout -B "$BRANCH"

          # Stage everything: updated reference files + state.json
          git add -A

          CHANGED_FILES=$(git diff origin/main --name-only | grep -v state.json | head -20 || true)
          git commit -m "autoupdate: sync documentation references $(date -u +%Y-%m-%d)

          Updated reference descriptions for changed Chainlink docs pages.

          Changed files:
          $(git diff origin/main --name-only | grep -v state.json | sed 's/^/  - /' || echo '  (only state.json updated)')

          Generated by the autoupdate workflow."

      - name: Push branch
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: git push origin HEAD --force-with-lease

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.commit.outputs.branch }}"

          # Build list of changed reference files for PR body
          CHANGED=$(git diff origin/main --name-only | grep "references/" | sed 's/^/- /' || echo "- (see diff)")

          # Check if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')

          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --title "autoupdate: sync documentation references $(date -u +%Y-%m-%d)" \
              --body "## Summary

          This PR was automatically generated by the [autoupdate workflow](.github/workflows/autoupdate.yml).
          It updates reference file descriptions for Chainlink documentation pages that changed since the last merge.

          ## Changed reference files

          ${CHANGED}

          ## What to review

          - Do the new descriptions accurately reflect the current page content?
          - Are important technical details (function signatures, parameters, caveats) preserved?
          - Are deprecation warnings and L2 requirements still mentioned where needed?

          Merge when the descriptions look correct. The stored checksums in \`autoupdate/state.json\` are updated as part of this PR, so the next weekly run will only re-check pages that change after this merge.

          ---
          🤖 Generated by [autoupdate](.github/workflows/autoupdate.yml)" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR already open for $BRANCH — branch was updated with new changes."
          fi
